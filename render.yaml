services:
  - type: web
    name: under1000-api
    env: python
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.__main__:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: under1000-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://under1000.netlify.app
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: under1000-db
    plan: free
    databaseName: under1000
    region: frankfurt
